name: User Service CI

# Trigger HANYA kalau ada perubahan di folder user-service/
# Ini inti dari "path filtering" yang kita bahas
on:
  push:
    branches: [main]
    paths:
      - "user-service/**"
  pull_request:
    branches: [main]
    paths:
      - "user-service/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./user-service
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: ./user-service
        run: pnpm build

      - name: Build Docker image
        working-directory: ./user-service
        run: docker build -t microservice-queue-user-service:${{ github.sha }} .